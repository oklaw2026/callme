<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搵樓！搵我O.K.LAW！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #0f172a; }
        .media-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px 12px 0 0; background: #1e293b; }
        .media-container iframe, .media-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="text-slate-200">

<div id="app" class="pb-24">
    <!-- Header -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="font-black text-2xl bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">搵樓！搵我O.K.LAW！</div>
            <div class="text-xs font-bold border border-blue-500/50 text-blue-400 px-3 py-1 rounded-full tracking-widest">📞54093210</div>
        </div>
    </header>

    <main class="container mx-auto p-4 min-h-screen">
        <!-- 篩選器 -->
        <div class="bg-slate-800/50 rounded-2xl p-6 mb-8 border border-slate-700 shadow-2xl">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <h2 class="font-bold text-xl text-white">🎯 精確搵樓</h2>
                <div class="flex items-center bg-slate-900 p-1 rounded-xl border border-slate-700">
                    <button @click="matchMode = 'OR'" :class="matchMode === 'OR' ? 'bg-blue-600 text-white' : 'text-slate-400'" class="px-4 py-2 rounded-lg text-sm font-bold transition-all">部分符合</button>
                    <button @click="matchMode = 'AND'" :class="matchMode === 'AND' ? 'bg-blue-600 text-white' : 'text-slate-400'" class="px-4 py-2 rounded-lg text-sm font-bold transition-all">同時符合</button>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <button @click="selectedTags = []" class="px-4 py-2 rounded-lg text-sm border border-slate-600 text-slate-400 hover:bg-slate-700">清空</button>
                <button v-for="tag in allTags" :key="tag" @click="toggleTag(tag)" :class="selectedTags.includes(tag) ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-300'" class="px-4 py-2 rounded-lg text-sm border border-slate-700 transition-all">
                    {{ tag }}
                </button>
            </div>
        </div>

        <!-- 列表 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="item in displayedItems" :key="item.id" class="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700 hover:border-blue-500/50 transition-all shadow-lg group">
                
                <!-- 媒體區塊 -->
                <div class="media-container">
                    <!-- 如果是影片 -->
                    <template v-if="item.type === 'video'">
                        <div v-html="item.embedCode"></div>
                    </template>
                    <!-- 如果是圖片 -->
                    <template v-else-if="item.type === 'images'">
                        <img :src="item.images[0]" class="cursor-pointer" @click="openGallery(item)">
                        <div class="absolute bottom-3 right-3 bg-black/70 text-white text-xs px-2 py-1 rounded-md pointer-events-none">
                            🖼️ {{ item.images.length }} 張圖片
                        </div>
                    </template>
                </div>
                
                <div class="p-5">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg text-white group-hover:text-blue-400 transition-colors">{{ item.title }}</h3>
                        <span class="text-[10px] text-slate-500">ID: {{ item.id }}</span>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span v-for="t in item.tags" class="text-[10px] font-bold bg-slate-900 text-slate-400 px-2 py-1 rounded">#{{ t }}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button @click="shareWhatsApp(item)" class="bg-[#25D366] text-white py-2 rounded-xl text-sm font-bold hover:opacity-90">WhatsApp 轉發</button>
                        <button @click="shareWeChat(item)" class="bg-[#07C160] text-white py-2 rounded-xl text-sm font-bold hover:opacity-90">微信 轉發</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 圖片查看器 (Modal) -->
        <transition name="fade">
            <div v-if="gallery.isOpen" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-4">
                <button @click="closeGallery" class="absolute top-6 right-6 text-white text-4xl">&times;</button>
                
                <div class="relative w-full max-w-4xl flex items-center justify-center">
                    <button @click="prevImg" class="absolute left-0 bg-white/10 hover:bg-white/20 p-4 rounded-full text-white text-2xl">❮</button>
                    <img :src="gallery.images[gallery.index]" class="max-h-[80vh] max-w-full object-contain shadow-2xl transition-all">
                    <button @click="nextImg" class="absolute right-0 bg-white/10 hover:bg-white/20 p-4 rounded-full text-white text-2xl">❯</button>
                </div>
                
                <div class="mt-6 text-slate-400 font-bold">
                    {{ gallery.index + 1 }} / {{ gallery.images.length }}
                </div>
            </div>
        </transition>

        <!-- 加載更多 -->
        <div v-if="hasMore" class="mt-12 text-center">
            <button @click="loadMore" class="bg-slate-800 border border-slate-600 px-12 py-4 rounded-full font-bold text-blue-400">顯示更多 (還有 {{ remainingCount }} 條)</button>
        </div>

         <div v-if="filteredVideos.length === 0" class="py-20 text-center text-slate-500">
            <p class="text-4xl mb-4">🏠</p>
            <p>暫時沒有符合標籤的盤源</p>
        </div>

        <section class="mt-20 bg-gradient-to-br from-blue-900 to-indigo-950 rounded-3xl p-10 text-center border border-blue-800/50 shadow-2xl">
            <h2 class="text-3xl font-black text-white mb-6">搵樓Call我</h2>
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <a href="tel:+85254093210" class="bg-white text-blue-900 px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">📞 5409 3210</a>
                <a href="https://wa.me/85298765432" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">💬 WhatsApp</a>
            </div>
            <p class="mt-6 text-blue-300/60 text-sm">微信號：YourAgentID</p>
        </section>
    </main>
</div>

<script>
    const { createApp, ref, computed, watch } = Vue;

    createApp({
        setup() {
            const selectedTags = ref([]);
            const matchMode = ref('OR');
            const pageSize = 6;
            const currentPage = ref(1);

            // 數據庫新增了 type 和 images 欄位
            const items = ref([
                { id: 1, type: 'video', title: '最新：西九龍四房豪宅', tags: ['豪宅', '西九龍', '四房'], videoUrl: 'https://youtu.be/gPoaUt3Fnpk', embedCode: '<iframe src="https://www.youtube.com/embed/gPoaUt3Fnpk"></iframe>' },

                { id: 2, type: 'video', title: '屯門兩房 - 罕有放盤', tags: ['上車盤', '屯門', '兩房'], videoUrl: 'https://youtu.be/dQw4w9WgXcQ', embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>' },

                { id: 3, type: 'video', title: '啟德新區 - 投資必選', tags: ['投資', '啟德'], videoUrl: 'https://youtu.be/dQw4w9WgXcQ', embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>' },

                { id: 4, type: 'video', title: '元朗大屋苑 - 園景三房', tags: ['元朗', '三房'], videoUrl: 'https://youtu.be/dQw4w9WgXcQ', embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>' },

                { id: 5, type: 'video', title: '將軍澳地鐵沿線', tags: ['將軍澳', '兩房'], videoUrl: 'https://youtu.be/dQw4w9WgXcQ', embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>' },

                { id: 6, type: 'video', title: '大埔村屋高層', tags: ['村屋', '大埔'], videoUrl: 'https://youtu.be/dQw4w9WgXcQ', embedCode: '<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>' },

                { id: 7, type: 'video', title: '沙田複式戶', tags: ['豪宅', '特色戶'], videoUrl: 'https://youtu.be/cFKQCfP5sZA', embedCode: '<iframe src="https://www.youtube.com/embed/cFKQCfP5sZA"></iframe>' }, 

                { id: 8, type: 'video', title: '沙田複式戶', tags: ['123', 'abc'], videoUrl: 'https://youtu.be/kl4u4LfyvGI', embedCode: '<iframe src="https://www.youtube.com/embed/kl4u4LfyvGI"></iframe>' },
                { 
                    id: 9, 
                    type: 'images', 
                    title: '【全新】九龍塘三房實拍', 
                    tags: ['九龍塘', '三房', '全新裝修'], 
                    images: [
                        'https://i.lih.kg/thumbnail?u=https%3A%2F%2Fna.cx%2Fi%2F2AgCcqh.jpg&h=b27b556d&s=540',
                        'https://i.lih.kg/thumbnail?u=https%3A%2F%2Fna.cx%2Fi%2FjejwhpE.webp&h=06edace5&s=540',
                        'https://i.lih.kg/thumbnail?u=https%3A%2F%2Fna.cx%2Fi%2Fyq2U0mp.jpg&h=ee91f17a&s=540'
                    ],
                    videoUrl: '' // 圖片模式可留空
                },

            ]);

            // 圖片集彈窗狀態
            const gallery = ref({ isOpen: false, images: [], index: 0 });

            const openGallery = (item) => {
                gallery.value.images = item.images;
                gallery.value.index = 0;
                gallery.value.isOpen = true;
                document.body.style.overflow = 'hidden'; // 禁止背景滾動
            };

            const closeGallery = () => {
                gallery.value.isOpen = false;
                document.body.style.overflow = 'auto';
            };

            const nextImg = () => {
                gallery.value.index = (gallery.value.index + 1) % gallery.value.images.length;
            };

            const prevImg = () => {
                gallery.value.index = (gallery.value.index - 1 + gallery.value.images.length) % gallery.value.images.length;
            };

            // 篩選與排序
            const filteredItems = computed(() => {
                let result = [...items.value];
                if (selectedTags.value.length > 0) {
                    result = result.filter(v => {
                        return matchMode.value === 'AND' 
                            ? selectedTags.value.every(t => v.tags.includes(t))
                            : selectedTags.value.some(t => v.tags.includes(t));
                    });
                }
                return result.sort((a, b) => b.id - a.id);
            });

            const displayedItems = computed(() => filteredItems.value.slice(0, currentPage.value * pageSize));
            const hasMore = computed(() => displayedItems.value.length < filteredItems.value.length);
            const remainingCount = computed(() => filteredItems.value.length - displayedItems.value.length);
            const loadMore = () => { currentPage.value++; };

            watch([selectedTags, matchMode], () => { currentPage.value = 1; }, { deep: true });

            const allTags = computed(() => {
                const s = new Set();
                items.value.forEach(v => v.tags.forEach(t => s.add(t)));
                return Array.from(s).sort();
            });

            const toggleTag = (tag) => {
                const i = selectedTags.value.indexOf(tag);
                if (i > -1) selectedTags.value.splice(i, 1);
                else selectedTags.value.push(tag);
            };

            const shareWhatsApp = (item) => {
                const url = item.type === 'video' ? item.videoUrl : '(圖片盤源，請聯絡查詢)';
                const text = encodeURIComponent(`搵樓！搵我O.K.LAW！\n影片/相片：${item.title}\n${url}`);
                window.open(`https://wa.me/?text=${text}`, '_blank');
            };

            const shareWeChat = (item) => {
                const url = item.type === 'video' ? item.videoUrl : '精選相片盤源';
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = `搵樓！O.K.LAW：${item.title}\n${url}`;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert('已複製推薦語，請貼上至微信！');
            };

            return { 
                selectedTags, allTags, toggleTag, matchMode, 
                displayedItems, filteredItems, hasMore, loadMore, remainingCount,
                shareWhatsApp, shareWeChat,
                gallery, openGallery, closeGallery, nextImg, prevImg
            };
        }
    }).mount('#app');
</script>
</body>
</html>
